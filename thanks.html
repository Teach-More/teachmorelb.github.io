<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank you, TeachMore</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/png" href="assets/favicon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer">
    <style>
        .thanks-wrap {
            min-height: 100vh;
            display: grid;
            place-items: center;
            text-align: center;
            padding: 2rem;
            background:
                radial-gradient(900px 450px at 50% -10%, rgba(28, 58, 94, 0.09), transparent 60%),
                var(--cream);
        }
        .thanks-card {
            max-width: 540px;
        }
        .thanks-icon {
            width: 88px; height: 88px;
            margin: 0 auto 1.75rem;
            border-radius: 50%;
            background: var(--ink);
            color: #fff;
            display: grid;
            place-items: center;
            font-size: 2.2rem;
            box-shadow: var(--shadow-lg);
        }
        .thanks-card p { color: var(--text-muted); font-size: 1.1rem; margin: 1rem 0 2rem; }
    </style>
</head>

<body>
    <div class="thanks-wrap">
        <div class="thanks-card">
            <div class="thanks-icon"><i class="fas fa-check"></i></div>
            <h1>Thank you!</h1>
            <p>We've received your request. Our team will get back to you within 24 hours about the Pharmacy Entrance
                Exam course.</p>
            <div class="hero-buttons" style="justify-content:center;">
                <a href="index.html" class="btn btn-primary"><i class="fas fa-house"></i> Back to Home</a>
                <a href="courses.html" class="btn btn-secondary">Browse Courses</a>
            </div>
        </div>
    </div>
</body>

</html>
